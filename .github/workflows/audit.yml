name: Security Audit

on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run bun audit (high severity)
        run: bun audit --severity=high
        continue-on-error: true

      - name: Create issue if vulnerabilities found
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ Security: High-severity vulnerabilities detected',
              body: 'The weekly dependency audit found high-severity vulnerabilities. Run `bun audit` locally and update affected packages.',
              labels: ['security', 'automated']
            })
